name: Publish GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/thefireman18287/st-video-worker:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Verify architecture
        run: |
          docker pull ghcr.io/thefireman18287/st-video-worker:latest
          arch="$(docker inspect ghcr.io/thefireman18287/st-video-worker:latest --format '{{.Architecture}}')"
          echo "Architecture: ${arch}"
          test "${arch}" = "amd64"
